<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Actions Deployment</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p  { color: #8b949e; font-size: 1.1rem; }
    .badge {
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: #238636;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Hello, GitHub Actions! 🚀</h1>
  <p>Deployed automatically via GitHub Actions to GitHub Pages.</p>
  <span class="badge">✅ CI/CD Pipeline Active</span>
</body>
</html>
